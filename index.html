<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kentucky Postsecondary Advising Scope and Sequence Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #334155; line-height: 1.6; font-size: 16px; background: transparent; padding: 0 0.5rem; }
    .ss-grade-btn { width: 44px; height: 44px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.78em; font-weight: 600; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s; flex-shrink: 0; position: relative; z-index: 1; }
    .ss-grade-btn:hover { transform: scale(1.12); }
    .ss-grade-btn.active { transform: scale(1.15); border-color: #fff; box-shadow: 0 0 0 3px currentColor; }
    .ss-grade-btn.ms { background: #2B4EE8; }
    .ss-grade-btn.ms.active { box-shadow: 0 0 0 3px #2B4EE8; }
    .ss-grade-btn.hs { background: #7B3FD4; }
    .ss-grade-btn.hs.active { box-shadow: 0 0 0 3px #7B3FD4; }
    .ss-detail-panel { overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; max-height: 0; opacity: 0; }
    .ss-detail-panel.open { max-height: 1000px; opacity: 1; }
    .ss-focus-card { border-radius: 10px; padding: 0.85rem 1rem; }
    .ss-focus-card .fc-title { font-weight: 600; font-size: 0.85em; margin-bottom: 0.2rem; }
    .ss-focus-card .fc-obj { font-size: 0.82em; color: #475569; margin-bottom: 0.25rem; }
    .ss-focus-card .fc-ev { font-size: 0.78em; color: #64748B; font-style: italic; }
    .ss-connector { height: 3px; flex: 1; }
    .ss-phase-label { text-align: center; padding: 4px 2px; font-size: 0.72em; font-weight: 600; }
    .ss-phase-label .full { display: inline; }
    .ss-phase-label .short { display: none; }
    @media (max-width: 520px) {
      .ss-grade-btn { width: 38px; height: 38px; font-size: 0.7em; border-width: 2px; }
      .ss-grade-btn.active { transform: scale(1.1); }
      .ss-phase-label { font-size: 0.58em; line-height: 1.2; padding: 3px 0; }
      .ss-phase-label .full { display: none; }
      .ss-phase-label .short { display: inline; }
      .ss-connector { display: none; }
      .ss-focus-card { padding: 0.7rem 0.8rem; }
      .ss-focus-card .fc-title { font-size: 0.82em; }
      .ss-focus-card .fc-obj { font-size: 0.78em; }
      .ss-focus-card .fc-ev { font-size: 0.74em; }
    }
  </style>
</head>
<body>
  <div style="max-width: 800px; margin: 0 auto;">
    <div style="background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 14px; padding: 1.5rem 1rem;">
      <div style="text-align: center; margin-bottom: 0.5rem; font-size: 0.85em; color: #64748B;">Click a grade to explore</div>
      <div style="display: flex; gap: 8px; margin-bottom: 1rem;">
        <div style="flex: 3; background: rgba(43,78,232,0.1); border-radius: 20px; padding: 6px 0; text-align: center; font-size: 0.8em; font-weight: 600; color: #2B4EE8;">Middle School</div>
        <div style="flex: 4; background: rgba(123,63,212,0.1); border-radius: 20px; padding: 6px 0; text-align: center; font-size: 0.8em; font-weight: 600; color: #7B3FD4;">High School</div>
      </div>
      <table style="width: 100%; border-collapse: collapse; table-layout: fixed;">
        <tr>
          <td style="padding: 0 0 4px; vertical-align: middle;"><div style="display: flex; align-items: center;"><div style="flex: 1;"></div><div class="ss-grade-btn ms" data-grade="6" onclick="ssToggleGrade(6)">6th</div><div class="ss-connector" style="background: #2B4EE8;"></div></div></td>
          <td style="padding: 0 0 4px; vertical-align: middle;"><div style="display: flex; align-items: center;"><div class="ss-connector" style="background: #2B4EE8;"></div><div class="ss-grade-btn ms" data-grade="7" onclick="ssToggleGrade(7)">7th</div><div class="ss-connector" style="background: #2B4EE8;"></div></div></td>
          <td style="padding: 0 0 4px; vertical-align: middle;"><div style="display: flex; align-items: center;"><div class="ss-connector" style="background: #2B4EE8;"></div><div class="ss-grade-btn ms" data-grade="8" onclick="ssToggleGrade(8)">8th</div><div class="ss-connector" style="height: 0; border-top: 3px dashed #94A3B8;"></div></div></td>
          <td style="padding: 0 0 4px; vertical-align: middle;"><div style="display: flex; align-items: center;"><div class="ss-connector" style="height: 0; border-top: 3px dashed #94A3B8;"></div><div class="ss-grade-btn hs" data-grade="9" onclick="ssToggleGrade(9)">9th</div><div class="ss-connector" style="background: #7B3FD4;"></div></div></td>
          <td style="padding: 0 0 4px; vertical-align: middle;"><div style="display: flex; align-items: center;"><div class="ss-connector" style="background: #7B3FD4;"></div><div class="ss-grade-btn hs" data-grade="10" onclick="ssToggleGrade(10)">10th</div><div class="ss-connector" style="background: #7B3FD4;"></div></div></td>
          <td style="padding: 0 0 4px; vertical-align: middle;"><div style="display: flex; align-items: center;"><div class="ss-connector" style="background: #7B3FD4;"></div><div class="ss-grade-btn hs" data-grade="11" onclick="ssToggleGrade(11)">11th</div><div class="ss-connector" style="background: #7B3FD4;"></div></div></td>
          <td style="padding: 0 0 4px; vertical-align: middle;"><div style="display: flex; align-items: center;"><div class="ss-connector" style="background: #7B3FD4;"></div><div class="ss-grade-btn hs" data-grade="12" onclick="ssToggleGrade(12)">12th</div><div style="flex: 1;"></div></div></td>
        </tr>
        <tr class="ss-phase-row">
          <td class="ss-phase-label" style="color: #2B4EE8;"><span class="full">Exploration</span><span class="short">Explore</span></td>
          <td class="ss-phase-label" style="color: #2B4EE8;"><span class="full">Preparation</span><span class="short">Prepare</span></td>
          <td class="ss-phase-label" style="color: #2B4EE8;"><span class="full">Application</span><span class="short">Apply</span></td>
          <td class="ss-phase-label" style="color: #7B3FD4;"><span class="full">Investigation</span><span class="short">Investigate</span></td>
          <td class="ss-phase-label" style="color: #7B3FD4;"><span class="full">Connection</span><span class="short">Connect</span></td>
          <td class="ss-phase-label" style="color: #7B3FD4;"><span class="full">Decision</span><span class="short">Decide</span></td>
          <td class="ss-phase-label" style="color: #7B3FD4;"><span class="full">Action</span><span class="short">Act</span></td>
        </tr>
      </table>
      <div id="ss-detail-panel" class="ss-detail-panel" style="margin-top: 0.75rem;"></div>
    </div>
  </div>
  <script>
  var ssGradeData={6:{phase:"Exploration",outcome:"Students will build awareness of Kentucky Career Clusters, learn key vocabulary related to postsecondary education and financial literacy, set goals that support future readiness, and build relationships that support future readiness.",color:"#2B4EE8",focus:[{area:"Career Exploration",icon:"\uD83D\uDCBC",bg:"#EFF6FF",color:"#2B4EE8",objective:"Build awareness of career clusters and how career choices impact lifestyles",evidence:"Students create initial ILP with strengths, interests, and related careers; connect interests to three career clusters"},{area:"Postsecondary Opportunities",icon:"\uD83C\uDF93",bg:"#F0FDF4",color:"#059669",objective:"Understand the concept of postsecondary education through basic vocabulary and concepts",evidence:"Students describe multiple paths for postsecondary education and update their ILP with postsecondary plans"},{area:"Financial Literacy",icon:"\uD83D\uDCB0",bg:"#F5F0EB",color:"#8B6F47",objective:"Understand basic financial literacy vocabulary and concepts (saving, credit, debt)",evidence:"Students can match financial literacy words with their correct definitions"},{area:"Essential Skills",icon:"\uD83E\uDD1D",bg:"#F5F3FF",color:"#7B3FD4",objective:"Build social capital through connections with peers and adults that support future readiness",evidence:"Students identify 3+ people who support their journey and add them to the ILP Network tab"}]},7:{phase:"Preparation",outcome:"Students will connect their strengths and interests, potential careers, and extracurricular activities to postsecondary options. Students will build financial literacy, set personal goals, and participate in collaborative discussions.",color:"#2B4EE8",focus:[{area:"Career Exploration",icon:"\uD83D\uDCBC",bg:"#EFF6FF",color:"#2B4EE8",objective:"Identify career-connected extracurricular activities that align with interests and skills",evidence:"Students revise ILP based on interests, values, and skills; include current postsecondary thinking"},{area:"Postsecondary Opportunities",icon:"\uD83C\uDF93",bg:"#F0FDF4",color:"#059669",objective:"Make connections between interests and college majors",evidence:"Students connect interests and career clusters to available college majors; update ILP"},{area:"Financial Literacy",icon:"\uD83D\uDCB0",bg:"#F5F0EB",color:"#8B6F47",objective:"Develop the concept of financial literacy and the role money plays in personal wellbeing",evidence:"Students reflect on a financial decision they would make to improve their wellbeing"},{area:"Essential Skills",icon:"\uD83E\uDD1D",bg:"#F5F3FF",color:"#7B3FD4",objective:"Demonstrate an ability to set goals and engage in collaborative discussions",evidence:"Students connect strengths, interests, and actions to future career goals; update network and career goals"}]},8:{phase:"Application",outcome:"Students will actively engage in career exploration, connect interests to high school and CTE courses, understand how career choices align with postsecondary plans and financial goals, and identify mentors who can support their journey.",color:"#2B4EE8",focus:[{area:"Career Exploration",icon:"\uD83D\uDCBC",bg:"#EFF6FF",color:"#2B4EE8",objective:"Identify top three career clusters and explore CTE pathway opportunities at the high school level",evidence:"Students revise ILP to include CTE pathways of interest"},{area:"Postsecondary Opportunities",icon:"\uD83C\uDF93",bg:"#F0FDF4",color:"#059669",objective:"Build awareness of available high school and CTE courses and how they relate to postsecondary plans",evidence:"Students map courses to CTE pathway and compile research on two available pathways at their prospective high school"},{area:"Financial Literacy",icon:"\uD83D\uDCB0",bg:"#F5F0EB",color:"#8B6F47",objective:"Understand financial literacy vocabulary and align career choices with financial goals",evidence:"Students update ILPs to reflect current postsecondary and career goals connected to financial realities"},{area:"Essential Skills",icon:"\uD83E\uDD1D",bg:"#F5F3FF",color:"#7B3FD4",objective:"Actively identify and engage with mentors; plan 9th-grade courses and extracurriculars",evidence:"Students create a 9th-grade course schedule aligned to postsecondary goals and upload to ILP"}]},9:{phase:"Investigation",outcome:"Students build foundational knowledge of college and career vocabulary, explore postsecondary opportunities, and recognize how extracurricular involvement, leadership, and early planning support future success.",color:"#7B3FD4",focus:[{area:"Career Exploration",icon:"\uD83D\uDCBC",bg:"#EFF6FF",color:"#2B4EE8",objective:"Develop knowledge of CTE Pathways and Credentials of Value",evidence:"Students identify pathway exploration worksheet in ILP and explain how it informs future coursetaking"},{area:"Postsecondary Opportunities",icon:"\uD83C\uDF93",bg:"#F0FDF4",color:"#059669",objective:"Become familiar with college and career vocabulary such as dual credit, work-based learning, and credentials of value",evidence:"Students compare and contrast early postsecondary opportunities available at their high school"},{area:"Financial Literacy",icon:"\uD83D\uDCB0",bg:"#F5F0EB",color:"#8B6F47",objective:"Build awareness of available scholarships including need-based vs. merit-based and KEES",evidence:"Students explain the connection between high school experiences and grants/awards for postsecondary education"},{area:"Essential Skills",icon:"\uD83E\uDD1D",bg:"#F5F3FF",color:"#7B3FD4",objective:"Understand the importance of networking and making connections with adults and peers",evidence:"Students complete a network map and update the Network tab in their ILP"}]},10:{phase:"Connection",outcome:"Students deepen their understanding of career pathways, postsecondary options, and associated costs while developing leadership skills and recognizing the importance of readiness for postsecondary success.",color:"#7B3FD4",focus:[{area:"Career Exploration",icon:"\uD83D\uDCBC",bg:"#EFF6FF",color:"#2B4EE8",objective:"Understand career clusters, how career choices impact lifestyles, and develop knowledge of available CTE pathways",evidence:"Students connect interests and strengths to a career cluster and consider how it impacts their future lifestyle and postsecondary plan"},{area:"Postsecondary Opportunities",icon:"\uD83C\uDF93",bg:"#F0FDF4",color:"#059669",objective:"Understand the importance of postsecondary readiness exams",evidence:"Students create a plan to get ready for the free exam by their junior year"},{area:"Financial Literacy",icon:"\uD83D\uDCB0",bg:"#F5F0EB",color:"#8B6F47",objective:"Develop awareness of postsecondary education costs using Futuriti\u2019s Net Price Calculator",evidence:"Students create cost of attendance comparison for different postsecondary options connected to their plans"},{area:"Essential Skills",icon:"\uD83E\uDD1D",bg:"#F5F3FF",color:"#7B3FD4",objective:"Develop leadership skills through extracurricular participation",evidence:"Students reflect on current experiences and set a goal for a future leadership activity; upload to ILP"}]},11:{phase:"Decision",outcome:"Students actively engage in career-connected experiences, refine their postsecondary plans, develop professional communication skills, and build knowledge of financial aid and scholarship opportunities.",color:"#7B3FD4",focus:[{area:"Career Exploration",icon:"\uD83D\uDCBC",bg:"#EFF6FF",color:"#2B4EE8",objective:"Participate in at least one extracurricular activity and enroll in a career-connected experience",evidence:"Students submit a completed career survey and update ILP with current career and postsecondary plans"},{area:"Postsecondary Opportunities",icon:"\uD83C\uDF93",bg:"#F0FDF4",color:"#059669",objective:"Create a college/career interest list to organize post-high school plans",evidence:"Students complete research worksheets for two careers and colleges that provide training; upload to ILP"},{area:"Financial Literacy",icon:"\uD83D\uDCB0",bg:"#F5F0EB",color:"#8B6F47",objective:"Develop understanding of financial aid application processes and scholarship timelines",evidence:"Students create a yearlong plan for senior-year financial aid and scholarship season; upload to ILP"},{area:"Essential Skills",icon:"\uD83E\uDD1D",bg:"#F5F3FF",color:"#7B3FD4",objective:"Communicate professionally with adults via conversation, email, phone, and in-person",evidence:"Students reflect on communication challenges and update Network tab with two new contacts"}]},12:{phase:"Action",outcome:"Students finalize and implement a postsecondary plan by completing applications, securing financial aid, leveraging their network, and demonstrating financial readiness for life after high school.",color:"#7B3FD4",focus:[{area:"Career Exploration",icon:"\uD83D\uDCBC",bg:"#EFF6FF",color:"#2B4EE8",objective:"Develop a postsecondary plan and articulate connections to career interests through pathway mapping and informational interviews",evidence:"Students articulate their intended pathway verbally with a mentor; upload school-to-work pathway to ILP"},{area:"Postsecondary Opportunities",icon:"\uD83C\uDF93",bg:"#F0FDF4",color:"#059669",objective:"Complete at least one postsecondary application",evidence:"Students notify guidance staff of their application and the name of the college/university"},{area:"Financial Literacy",icon:"\uD83D\uDCB0",bg:"#F5F0EB",color:"#8B6F47",objective:"Submit the FAFSA and apply to at least one scholarship",evidence:"Students have filed the FAFSA to begin the financial aid process for postsecondary education"},{area:"Essential Skills",icon:"\uD83E\uDD1D",bg:"#F5F3FF",color:"#7B3FD4",objective:"Build and leverage a professional network",evidence:"Students craft and send one networking email regarding support for their postsecondary plans"}]}};
  var ssCurrentGrade=null;
  function ssToggleGrade(g){var panel=document.getElementById('ss-detail-panel');var btns=document.querySelectorAll('.ss-grade-btn');if(ssCurrentGrade===g){panel.classList.remove('open');btns.forEach(function(b){b.classList.remove('active');});ssCurrentGrade=null;setTimeout(notifyParent,400);return;}ssCurrentGrade=g;btns.forEach(function(b){b.classList.toggle('active',parseInt(b.getAttribute('data-grade'))===g);});var d=ssGradeData[g];var suffix=g===1?'st':g===2?'nd':g===3?'rd':'th';var html='<div style="border: 2px solid '+d.color+'; border-radius: 14px; overflow: hidden;">';html+='<div style="background: '+d.color+'; padding: 1rem 1.25rem; color: #fff;">';html+='<div style="font-size: 1.15em; font-weight: 700;">'+g+suffix+' Grade: '+d.phase+'</div>';html+='<div style="font-size: 0.85em; opacity: 0.9; margin-top: 0.35rem; line-height: 1.5;">'+d.outcome+'</div></div>';html+='<div style="padding: 1rem 1.25rem; display: flex; flex-wrap: wrap; gap: 10px;">';d.focus.forEach(function(f){html+='<div class="ss-focus-card" style="flex: 1 1 calc(50% - 5px); min-width: 240px; background: '+f.bg+'; border: 1px solid '+f.color+'22;">';html+='<div class="fc-title" style="color: '+f.color+';">'+f.icon+' '+f.area+'</div>';html+='<div class="fc-obj">'+f.objective+'</div>';html+='<div class="fc-ev">Evidence: '+f.evidence+'</div></div>';});html+='</div></div>';panel.innerHTML=html;if(!panel.classList.contains('open')){panel.classList.add('open');}setTimeout(notifyParent,400);}
  function notifyParent(){window.parent.postMessage({type:'resize',height:document.body.scrollHeight},'*');}
  notifyParent();
  window.addEventListener('load',function(){ssToggleGrade(9);setTimeout(notifyParent,500);});
  </script>
</body>
</html>
